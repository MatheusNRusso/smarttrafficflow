# Production profile — Railway / Render
# All sensitive values are injected via environment variables.
# Set these in the Railway/Render dashboard:
#
#   DB_URL       → postgresql://user:pass@host:port/dbname
#   DB_USERNAME  → database username
#   DB_PASSWORD  → database password
#
# GeoJSON paths are NOT needed in production —
# routes are served from the PostgreSQL routes table.

spring:
  datasource:
    url: jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}
    username: ${PGUSER}
    password: ${PGPASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

server:
  port: ${PORT:8080}

# GeoJSON paths — empty in production (routes served from DB)
traffic:
  geojson:
    routes: ""
    stops:  ""

# Disable Swagger in production
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
