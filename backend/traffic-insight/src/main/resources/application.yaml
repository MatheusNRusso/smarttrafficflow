spring:
  application:
    name: traffic-insight

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/}
    username: ${DB_USERNAME:}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

ml:
  service:
    base-url: ${ML_SERVICE_URL:http://127.0.0.1:8080}

server:
  port: ${PORT:8080}

# GeoJSON data paths — optional in production.
# Routes are served from the PostgreSQL routes table after running import_routes.py.
# Override in application-local.yaml or via environment variables for local dev.
traffic:
  geojson:
    routes: ${ROUTES_GEOJSON_PATH:}
    stops:  ${STOPS_GEOJSON_PATH:}