<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
    <meta name="theme-color" content="#2c3e50">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <title>SmartTrafficFlow 2D - Rio de Janeiro</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
    <link rel="stylesheet" href="/css/styles-2d.css"/>
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/js/core/icon-256.png">
    <script src="/js/mobile-enhancements.js"></script>
</head>
<body>

<div class="controls" id="controlPanel">
    <div class="controls-header" onclick="toggleControls()">
        <h2>🚍 Smart Rio Bus Traffic</h2>
        <span class="controls-chevron" id="controlsChevron">▼</span>
    </div>
    <div class="controls-body" id="controlsBody">
        <p class="subtitle">Real-time traffic simulation based on historical data.</p>

        <label for="hourRange">⏰ Hour: <strong id="hourDisplay" style="color:#2980b9;">08:00</strong></label>
        <input type="range" id="hourRange" min="0" max="23" value="8" step="1"/>

        <label for="consortiumSelect" style="margin-top:4px;">🏢 Consortium:</label>
        <select id="consortiumSelect">
            <option value="">-- All Consortiums --</option>
        </select>

        <label for="lineSelect">🚌 Line:</label>
        <select id="lineSelect">
            <option value="">-- All Lines --</option>
        </select>

        <div id="directionControls" style="display:none; margin-top:10px; gap:8px; flex-direction:column;">
            <div style="display:flex; gap:8px;">
                <button id="direction0Btn" style="flex:1; padding:8px; background:#27ae60; color:white; border:none; border-radius:4px; cursor:pointer;">🚌 Outbound</button>
                <button id="direction1Btn" style="flex:1; padding:8px; background:#2980b9; color:white; border:none; border-radius:4px; cursor:pointer;">🔄 Inbound</button>
            </div>
            <button id="startSimBtn" style="width:100%; padding:10px; background:#e67e22; color:white; border:none; border-radius:4px; cursor:pointer; font-weight:bold; font-size:14px; letter-spacing:0.5px;">▶ Start Simulation</button>
        </div>

        <div style="margin-top:10px; display:grid; grid-template-columns:1fr 1fr; gap:6px;">
            <button id="resetBtn">🎯 Reset View</button>
            <button id="applyBtn">🔄 Refresh</button>
            <button id="locateUserBtn">📍 My Location</button>
            <button id="followBusBtn">🎯 Follow Bus</button>
        </div>

        <div style="margin-top:10px;">
            <button id="findRouteBtn2D" style="width:100%;padding:10px;background:#8e44ad;color:white;border:none;border-radius:4px;cursor:pointer;font-weight:bold;font-size:14px;">
                🗺️ Find Route
            </button>
        </div>

        <button id="mapStyleToggle" style="width:100%; margin-top:6px;">🌙 Dark Mode</button>

        <a href="/index.html" style="display:block;width:100%;padding:8px 10px;background:#2c3e50;color:white;border:none;border-radius:4px;cursor:pointer;font-size:0.85rem;font-weight:600;text-align:center;margin-top:6px;text-decoration:none;">
            ← Back to Home
        </a>
    </div>
</div>

<!-- Insights panel — floating bottom-right -->
<div class="insights-panel-2d" id="insightsPanel2D">
    <button class="insights-toggle-2d" onclick="toggleInsights2D()">
        📊 Traffic Insights <span id="insightsChevron2D">▲</span>
    </button>
    <div class="insights-body-2d" id="insightsBody2D">
        <div class="insights-section">
            <h4 class="insights-section-title-2d">Traffic Level Distribution</h4>
            <div id="levelBars2D" class="insight-bars-container">
                <p class="insight-empty">Loading...</p>
            </div>
        </div>

        <div class="insights-section" style="margin-top:12px;">
            <h4 class="insights-section-title-2d">Most Congested Lines</h4>
            <div id="topCongested2D" class="insight-routes-container">
                <p class="insight-empty">Loading...</p>
            </div>
        </div>

        <div class="insights-section" style="margin-top:12px;">
            <h4 class="insights-section-title-2d">Legend</h4>
            <div style="margin-top:6px;">
                <div class="legend-item"><span class="dot dot-low"></span>Low Traffic</div>
                <div class="legend-item"><span class="dot dot-medium"></span>Medium Traffic</div>
                <div class="legend-item"><span class="dot dot-high"></span>High Traffic</div>
                <div class="legend-item"><span class="dot dot-congested"></span>Congested</div>
                <div class="legend-item"><span class="dot dot-unknown"></span>No Data</div>
            </div>
            <div style="margin-top:10px;padding-top:8px;border-top:1px solid #eee;font-size:0.78rem;color:#888;line-height:1.7;">
                📊 <span id="routeCount">0</span> routes loaded<br>
                🚏 <span id="stopCount">0</span> stops loaded<br>
                🕐 <span id="currentHour"></span>
            </div>
        </div>
    </div>
</div>

<script>
    if (/Android|webOS|iPhone|iPad|iPod/i.test(navigator.userAgent)) {
        document.getElementById('controlPanel').classList.add('collapsed');
        document.getElementById('controlsChevron').textContent = '▲';
    }

    function toggleControls() {
        const panel   = document.getElementById('controlPanel');
        const chevron = document.getElementById('controlsChevron');
        const isCollapsed = panel.classList.toggle('collapsed');
        chevron.textContent = isCollapsed ? '▲' : '▼';
    }

    function toggleInsights2D() {
        const body    = document.getElementById('insightsBody2D');
        const chevron = document.getElementById('insightsChevron2D');
        const isOpen  = body.style.display !== 'none';
        body.style.display  = isOpen ? 'none' : 'block';
        chevron.textContent = isOpen ? '▼' : '▲';
    }
</script>

<div class="loading" id="loadingIndicator" style="display:none;">🔄 Loading data...</div>
<div id="tooltip" class="tooltip"></div>
<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
<script type="module" src="/js/2d/main-2d.js"></script>
</body>
</html>
