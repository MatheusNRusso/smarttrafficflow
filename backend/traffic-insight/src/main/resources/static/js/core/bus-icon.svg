<!-- js/core/bus-icon.svg -->
<!-- Bus icon optimized for Deck.gl IconLayer -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background circle for visibility on all map styles -->
  <circle cx="32" cy="32" r="30" fill="#ff6b00" stroke="#ffffff" stroke-width="3"/>

  <!-- Bus body -->
  <rect x="14" y="18" width="36" height="24" rx="4" fill="#ffffff" stroke="#333333" stroke-width="2"/>

  <!-- Front window (windshield) -->
  <rect x="42" y="20" width="6" height="10" rx="1" fill="#87CEEB" stroke="#333333" stroke-width="1"/>

  <!-- Side windows -->
  <rect x="18" y="20" width="8" height="8" rx="1" fill="#87CEEB" stroke="#333333" stroke-width="1"/>
  <rect x="28" y="20" width="8" height="8" rx="1" fill="#87CEEB" stroke="#333333" stroke-width="1"/>
  <rect x="38" y="20" width="6" height="8" rx="1" fill="#87CEEB" stroke="#333333" stroke-width="1"/>

  <!-- Wheels -->
  <circle cx="20" cy="42" r="5" fill="#222222" stroke="#ffffff" stroke-width="1"/>
  <circle cx="44" cy="42" r="5" fill="#222222" stroke="#ffffff" stroke-width="1"/>
  <circle cx="20" cy="42" r="2.5" fill="#666666"/>
  <circle cx="44" cy="42" r="2.5" fill="#666666"/>

  <!-- Headlight -->
  <circle cx="50" cy="32" r="2" fill="#FFD700"/>

  <!-- Route number indicator -->
  <text x="32" y="34" font-size="8" font-weight="bold" text-anchor="middle" fill="#ff6b00">🚌</text>
</svg>
